apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: traefik-core
  namespace: flux-system
spec:
  interval: 5m
  path: "./traefik/core"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: traefik-middlewares
  namespace: flux-system
spec:
  dependsOn:
    - name: traefik-core
  interval: 5m
  path: "./traefik/middlewares"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
